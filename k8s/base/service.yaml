apiVersion: v1
kind: Service
metadata:
  name: ct-execution
  labels:
    app: ct-execution
    component: execution-engine
spec:
  type: ClusterIP
  ports:
  - port: 5000
    targetPort: 5000
    protocol: TCP
    name: http
  selector:
    app: ct-execution
---
apiVersion: v1
kind: Service
metadata:
  name: ct-manager
  labels:
    app: ct-manager
    component: manager-engine
spec:
  type: ClusterIP
  ports:
  - port: 5002
    targetPort: 5002
    protocol: TCP
    name: http
  selector:
    app: ct-manager
---
apiVersion: v1
kind: Service
metadata:
  name: ct-monitor
  labels:
    app: ct-monitor
    component: monitor-engine
spec:
  type: ClusterIP
  ports:
  - port: 5003
    targetPort: 5003
    protocol: TCP
    name: http
  selector:
    app: ct-monitor
