<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TestRunner - Tables</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            background: #f0f2f5;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
        }
        .navbar-ct {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            padding: 14px 24px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.15);
        }
        .navbar-ct .brand {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
        }
        .navbar-ct .brand .icon-circle {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, #533483, #0f3460);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .navbar-ct .brand .icon-circle i {
            font-size: 16px;
            color: #fff;
        }
        .navbar-ct .brand span {
            font-size: 18px;
            font-weight: 700;
            color: #fff;
        }
        .page-content {
            max-width: 960px;
            margin: 40px auto;
            padding: 0 24px;
        }
        .page-title {
            font-size: 26px;
            font-weight: 700;
            color: #1a1a2e;
            margin-bottom: 8px;
        }
        .page-subtitle {
            color: #6c757d;
            font-size: 14px;
            margin-bottom: 28px;
        }
        .table-card {
            background: #fff;
            border-radius: 12px;
            border: 1px solid #e9ecef;
            transition: transform 0.15s, box-shadow 0.15s;
            overflow: hidden;
        }
        .table-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.08);
        }
        .table-card a {
            display: flex;
            align-items: center;
            gap: 14px;
            padding: 18px 22px;
            text-decoration: none;
            color: #212529;
        }
        .table-card .table-icon {
            width: 42px;
            height: 42px;
            border-radius: 10px;
            background: #e8f4fd;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .table-card .table-icon i {
            font-size: 18px;
            color: #0f3460;
        }
        .table-card .table-info h6 {
            font-weight: 600;
            margin: 0;
            font-size: 15px;
        }
        .table-card .table-info p {
            margin: 2px 0 0;
            font-size: 12px;
            color: #6c757d;
        }
        .table-card .arrow {
            margin-left: auto;
            color: #adb5bd;
            font-size: 18px;
        }
    </style>
</head>
<body>
    <nav class="navbar-ct">
        <a href="/" class="brand">
            <div class="icon-circle"><i class="bi bi-gear-wide-connected"></i></div>
            <span>TestRunner</span>
        </a>
    </nav>

    <div class="page-content">
        <h1 class="page-title">Database Tables</h1>
        <p class="page-subtitle">Select a table to view and manage its data</p>

        <div class="d-flex flex-column gap-2">
            {% for table in tables %}
            <div class="table-card">
                <a href="{{ url_for('test_set_bp.show_table_data', table_name=table) }}">
                    <div class="table-icon"><i class="bi bi-table"></i></div>
                    <div class="table-info">
                        <h6>{{ table }}</h6>
                        <p>View and edit table data</p>
                    </div>
                    <i class="bi bi-chevron-right arrow"></i>
                </a>
            </div>
            {% endfor %}
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
